<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio HLS Interstitial Test Stream</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f2;
        color: #202124;
      }

      main {
        width: min(720px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
        line-height: 1.15;
        font-weight: 680;
      }

      audio {
        width: 100%;
        margin: 12px 0 20px;
      }

      code {
        display: block;
        padding: 12px;
        overflow-wrap: anywhere;
        background: #e9ece6;
        border: 1px solid #d2d7cd;
        border-radius: 8px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #171a1c;
          color: #f3f4f1;
        }

        code {
          background: #24282b;
          border-color: #3a4044;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Audio HLS Interstitial Test Stream</h1>
      <audio controls src="/live.m3u8"></audio>
      <code>http://127.0.0.1:8765/live.m3u8</code>
    </main>
  </body>
</html>
